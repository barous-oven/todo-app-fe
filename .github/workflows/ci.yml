name: Frontend CI

on:
  pull_request:
    paths:
      - "app/**"
      - "src/**"
      - "components/**"
      - "hooks/**"
      - "lib/**"
      - "public/**"
      - "styles/**"
      - "Dockerfile"
      - "package.json"
      - "yarn.lock"
      - "tsconfig.json"
      - "next.config.*"
      - "postcss.config.*"
      - "tailwind.config.*"
      - ".eslintrc.*"
      - ".github/workflows/**"
  push:
    branches:
      - main
      - dev
    paths:
      - "app/**"
      - "src/**"
      - "components/**"
      - "hooks/**"
      - "lib/**"
      - "public/**"
      - "styles/**"
      - "Dockerfile"
      - "package.json"
      - "yarn.lock"
      - "tsconfig.json"
      - "next.config.*"
      - "postcss.config.*"
      - "tailwind.config.*"
      - ".eslintrc.*"
      - ".github/workflows/**"

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: yarn
          cache-dependency-path: yarn.lock

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Run lint
        run: yarn lint

      - name: Run type check
        run: yarn tsc --noEmit

      - name: Build project
        run: yarn build
